    reason: "Internal policy: v1.0.0 predates the current secret-handling guidance; use v2.x or step-security/action-slack-notify"
    advisory: ""
    references:
      - https://github.com/step-security/action-slack-notify
    fixed_in: v2.3.3
    confidence: community
    severity: low
    added: 2026-05-18
    added_by: pauline@huggingface.co
    notes: |
      No formal CVE. step-security publishes a hardened fork they describe
      as a "secure drop-in replacement", suggesting concerns but not a
      named vulnerability. Treat this entry as an org preference, not an
      advisory-backed block.
