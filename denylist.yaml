    advisory: https://github.com/reviewdog/reviewdog/security/advisories/GHSA-qmg3-hpqr-gqvc
    incident: reviewdog-cascade-2025-03
    fixed_in: v0.20.2
    confidence: ghsa-version-only
    severity: high
    added: 2026-05-19
    added_by: pauline@huggingface.co

  - action: reviewdog/action-ast-grep
    bad_shas: []
    bad_versions:
      - "< v1.26.2"
    reason: "Transitively compromised via reviewdog/action-setup@v1; advisory publishes no per-commit SHA"
    advisory: https://github.com/reviewdog/reviewdog/security/advisories/GHSA-qmg3-hpqr-gqvc
    incident: reviewdog-cascade-2025-03
