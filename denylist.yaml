  # ──────────────────────────────────────────────────────────────────────
  # Incident: trivy-tag-hijack-2026-03
  # 2026-03-19 ~17:43 UTC, the "TeamPCP" threat actor force-pushed 76 of
  # 77 trivy-action tags (v0.0.1–v0.34.2) and all 7 setup-trivy tags
  # (v0.2.0–v0.2.6) to malicious commits that prepended an infostealer to
  # the Trivy scan output. Fixed in trivy-action v0.35.0 / setup-trivy v0.2.6
  # (post-fix retag). GHSA-69fq-xp46-6x23.
  # ──────────────────────────────────────────────────────────────────────

  - action: aquasecurity/trivy-action
    bad_shas:
      # Current tag SHAs on the repo — these ARE the malicious force-pushed
      # commits as of 2026-05-19. Verified via `git ls-remote --tags`.
      - f781cce5aab226378ee181d764ab90ea0be3cdd8   # v0.25.0
      - a20de5420d57c4102486cdd9578b45609c99d7eb   # v0.26.0
      - 5681af892cd0f4997658e2bacc62bd0a894cf564   # v0.27.0
      - 915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2   # v0.28.0
      - 18f2510ee396bbf400402947b394f2dd8c87dbb0   # v0.29.0
      - 6c175e9c4083a92bbca2f9724c8a5e33bc2d97a5   # v0.30.0
      - 76071ef0d7ec797419534a183b498b4d6366cf37   # v0.31.0
      - dc5a429b52fcf669ce959baa2c2dd26090d2a6c4   # v0.32.0
      - f9424c10c36e288d5fa79bd3dfd1aeb2d6eae808   # v0.33.0
      - b6643a29fecd7f34b3597bc6acb0a98b03d33ff8   # v0.33.1
      - c1824fd6edce30d7ab345a9989de00bbd46ef284   # v0.34.0
    bad_versions:
      - "<= v0.34.2"   # 76 of 77 tags force-pushed; full list in advisory
    reason: "GHSA-69fq-xp46-6x23 — TeamPCP tag-hijack prepended infostealer to Trivy scan output"
    advisory: https://github.com/aquasecurity/trivy/security/advisories/GHSA-69fq-xp46-6x23
    references:
      - https://github.com/aquasecurity/trivy-action/releases/tag/v0.35.0
    incident: trivy-tag-hijack-2026-03
    fixed_in: v0.35.0
    confidence: upstream-postmortem
    severity: critical
    added: 2026-05-19
    added_by: pauline@huggingface.co
    notes: |
      Only the last ten major versions are enumerated by SHA — earlier tags
      (v0.0.1–v0.24.x) are too unlikely to be referenced in production
      workflows to be worth listing individually. Block them via
      `bad_versions` + pinact's age check.

  - action: aquasecurity/setup-trivy
    bad_shas: []
    bad_versions:
      - "v0.2.0"
      - "v0.2.1"
      - "v0.2.2"
      - "v0.2.3"
      - "v0.2.4"
      - "v0.2.5"
    reason: "GHSA-69fq-xp46-6x23 — same TeamPCP tag-hijack; pre-fix tags were deleted upstream, no SHAs to block"
    advisory: https://github.com/aquasecurity/trivy/security/advisories/GHSA-69fq-xp46-6x23
    incident: trivy-tag-hijack-2026-03
    fixed_in: v0.2.6
    confidence: ghsa-version-only
    severity: critical
    added: 2026-05-19
    added_by: pauline@huggingface.co
    notes: |
      Aqua deleted the compromised tags upstream — the malicious SHAs are no
      longer reachable through any ref, so a `bad_shas` list cannot match.
      Any `uses: aquasecurity/setup-trivy@<old-sha>` reference will now fail
      to resolve, which is the desired outcome.

  # ──────────────────────────────────────────────────────────────────────
  # Pre-existing entry, no known CVE — kept for org policy reasons.
  # ──────────────────────────────────────────────────────────────────────

  - action: rtCamp/action-slack-notify
    bad_shas:
      - eb535ea6be742688b75436c98b1bd2dffb2b3503   # v1.0.0
    bad_versions:
