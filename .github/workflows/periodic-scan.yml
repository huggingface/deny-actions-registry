name: periodic-scan

# Daily org-wide drift detection. Catches violations that landed on
# `main` before the relevant denylist entry / CVE / advisory existed —
# the PR-time `validate.yml` only protects new PRs, so existing code
# can still be running compromised actions or installing compromised
# packages without anyone noticing.
#
# Strategy: clone every non-archived non-fork repo in the org shallow,
# run the same four checks as validate.yml, and upsert one issue per
# affected repo in `huggingface/tracking-issues` (the central tracker).
#
# Required org / repo secret:
#   ORG_SCAN_PAT  fine-grained PAT scoped to the org with:
#     - Contents: Read-only         (clone every repo)
#     - Issues:   Read and write    (upsert tracking issues — used only
#                                    on TRACKING_REPO, but PATs can't
#                                    scope permissions per-repo when
#                                    selecting "All repositories")

on:
  schedule:
    - cron: '0 6 * * *'   # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Parallel repo scans (default 8)"
        required: false
        default: "8"
      exclude:
        description: "Comma-separated `org/repo` to skip"
        required: false
        default: ""

permissions:
  contents: read   # for self-checkout only; cross-repo access uses ORG_SCAN_PAT

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout deny-actions-registry
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install pinact
        run: |
          set -euo pipefail
          VERSION="v3.6.0"
          curl -fsSL -o /tmp/pinact.tar.gz \
            "https://github.com/suzuki-shunsuke/pinact/releases/download/${VERSION}/pinact_linux_amd64.tar.gz"
          tar -xzf /tmp/pinact.tar.gz -C /tmp pinact
          sudo install -m 0755 /tmp/pinact /usr/local/bin/pinact
          pinact --version

      - name: Install osv-scanner
        run: |
          set -euo pipefail
          VERSION="v2.3.8"
          curl -fsSL -o /tmp/osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/${VERSION}/osv-scanner_linux_amd64"
          sudo install -m 0755 /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Run org-wide scan
        env:
          GH_TOKEN:       ${{ secrets.ORG_SCAN_PAT }}
          REGISTRY_DIR:   ${{ github.workspace }}
          ORG:            huggingface
          TRACKING_REPO:  huggingface/tracking-issues
          # Don't scan ourselves — we'd find our own seed entries / test data.
          EXCLUDE_REPOS:  huggingface/deny-actions-registry
          CONCURRENCY:    ${{ github.event.inputs.concurrency || '8' }}
        run: |
          extra_excludes="${{ github.event.inputs.exclude }}"
          if [[ -n "$extra_excludes" ]]; then
            EXCLUDE_REPOS="${EXCLUDE_REPOS},${extra_excludes}"
          fi
          export EXCLUDE_REPOS
          python3 scripts/scan-org.py
