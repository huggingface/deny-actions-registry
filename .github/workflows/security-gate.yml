name: validate

# Validates GitHub Actions in the caller repo. Two ways to invoke:
#
#   A. Organization Ruleset → "Require workflows to pass before merging"
#      (recommended). GitHub triggers this file directly on PRs in target
#      repos via the `pull_request` trigger below — no caller workflow
#      file needed.
#
#   B. Caller-defined workflow that calls this one with `uses:` (legacy /
#      opt-in mode). Requires the `workflow_call` trigger below.
#
# Two checks against the caller repo's workflows:
#   1. pinact : every `uses:` must be pinned to a 40-char SHA.
#   2. denylist : no `uses:` may reference a SHA listed in this repo's
#      denylist.yaml.
#
# Fixable violations are posted as inline `Apply suggestion` review
# comments — never auto-pushed. The PR author clicks each suggestion to
# accept the pin. This avoids granting any write scope on workflow files.
#
# When invoked via mode B, the caller workflow MUST grant:
#   permissions:
#     contents: read           # to read workflow files
#     pull-requests: write     # to post the inline suggestions

on:
  workflow_call:
  pull_request:

jobs:
  pinact-check:
    name: Pin check (SHA + comment)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout caller repo (PR branch if PR)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: caller
          # ref: empty on push events → default branch; on PRs → head branch
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          persist-credentials: false

      - name: Checkout deny-actions-registry
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: huggingface/deny-actions-registry
          path: registry
          ref: main
          persist-credentials: false

      - name: Install pinact
        run: |
          set -euo pipefail
          VERSION="v3.6.0"
          curl -fsSL -o /tmp/pinact.tar.gz \
            "https://github.com/suzuki-shunsuke/pinact/releases/download/${VERSION}/pinact_linux_amd64.tar.gz"
          tar -xzf /tmp/pinact.tar.gz -C /tmp pinact
          sudo install -m 0755 /tmp/pinact /usr/local/bin/pinact
          pinact --version

      - name: Run pinact in check mode
        id: pinact
        working-directory: caller
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          pinact run --check 2>&1 | tee /tmp/pinact.out
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Report violations (summary + PR review suggestions)
        if: always()
        env:
          PINACT_EXITCODE: ${{ steps.pinact.outputs.exitcode }}
          PINACT_OUTPUT: /tmp/pinact.out
          CALLER_DIR: caller
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: python3 registry/scripts/report-pinact.py

      - name: Fail if pinact found violations
        if: always()
        run: exit "${{ steps.pinact.outputs.exitcode }}"

  denylist-check:
    name: Denylist check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: caller
          persist-credentials: false

      - name: Checkout deny-actions-registry
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: huggingface/deny-actions-registry
          path: registry
          ref: main
          persist-credentials: false

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run denylist check
        run: |
          bash ./registry/scripts/check.sh \
            ./registry/denylist.yaml \
            ./caller/.github/workflows

  package-denylist-check:
    name: Package denylist check (npm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: caller
          persist-credentials: false

      - name: Checkout deny-actions-registry
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: huggingface/deny-actions-registry
          path: registry
          ref: main
          persist-credentials: false

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run package denylist check
        run: |
          bash ./registry/scripts/check-packages.sh \
            ./registry/deny-packages.yaml \
            ./caller

  osv-scan:
    name: OSV vulnerability + malware scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: caller
          persist-credentials: false

      - name: Install osv-scanner
        run: |
          set -euo pipefail
          VERSION="v2.3.8"
          curl -fsSL -o /tmp/osv-scanner \
            "https://github.com/google/osv-scanner/releases/download/${VERSION}/osv-scanner_linux_amd64"
          sudo install -m 0755 /tmp/osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Run osv-scanner
        id: osv
        working-directory: caller
        run: |
          set +e
          # Scans every supported lockfile in the tree (package-lock.json,
          # pnpm-lock.yaml, yarn.lock, requirements.txt, Pipfile.lock, etc.)
          # against the OSV database, which includes the OpenSSF
          # malicious-packages feed.
          osv-scanner scan source --recursive --format=table . | tee /tmp/osv.out
          ec=${PIPESTATUS[0]}
          echo "exitcode=$ec" >> "$GITHUB_OUTPUT"
          # Exit codes (osv-scanner v2):
          #   0   = no vulns found
          #   1   = vulns found
          #   128 = no supported files found → treat as pass
          [[ "$ec" == "128" ]] && echo "::notice::osv-scanner found no supported lockfiles."

      - name: Append summary
        if: always()
        run: |
          {
            echo "## OSV scan"
            echo ""
            case "${{ steps.osv.outputs.exitcode }}" in
              0)   echo "**Result:** ✅ Passed — no vulnerabilities or malware found in OSV." ;;
              128) echo "**Result:** ✅ Skipped — no supported lockfiles in caller repo." ;;
              *)   echo "**Result:** ❌ Failed — see findings below." ;;
            esac
            echo ""
            if [[ -s /tmp/osv.out ]]; then
              echo "<details><summary>osv-scanner output</summary>"
              echo ""
              echo '```'
              cat /tmp/osv.out
              echo '```'
              echo ""
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if OSV found issues
        if: always()
        run: |
          ec="${{ steps.osv.outputs.exitcode }}"
          # 128 = no supported files → treat as pass
          [[ "$ec" == "128" ]] && exit 0
          exit "$ec"
