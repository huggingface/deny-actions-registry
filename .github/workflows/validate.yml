name: validate

# Reusable workflow called by other repos in the org, typically via
# an Organization Ruleset configured as "Required workflow".
#
# Runs two checks against the caller repo's workflows:
#   1. pinact --check : every `uses:` must be pinned to a 40-char SHA,
#      with a min_age guard and comment verification.
#   2. denylist scan  : no `uses:` may reference a SHA listed in
#      denylist.yaml of this repo.
#
# Either check failing blocks the PR (when wired as a required check).

on:
  workflow_call:
    inputs:
      pinact-config:
        description: "Path to .pinact.yaml in caller repo (optional)"
        required: false
        type: string
        default: ".pinact.yaml"

jobs:
  pinact-check:
    name: Pin check (SHA + comment)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install pinact
        run: |
          set -euo pipefail
          VERSION="v3.6.0"
          curl -fsSL -o /tmp/pinact.tar.gz \
            "https://github.com/suzuki-shunsuke/pinact/releases/download/${VERSION}/pinact_linux_amd64.tar.gz"
          tar -xzf /tmp/pinact.tar.gz -C /tmp pinact
          sudo install -m 0755 /tmp/pinact /usr/local/bin/pinact
          pinact --version

      - name: Run pinact in check mode
        id: pinact
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          pinact run --check 2>&1 | tee /tmp/pinact.out
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Build job summary
        if: always()
        run: |
          set -euo pipefail
          ec="${{ steps.pinact.outputs.exitcode }}"
          n_files=$(find .github/workflows -maxdepth 1 \( -name "*.yml" -o -name "*.yaml" \) 2>/dev/null | wc -l | tr -d ' ')
          n_uses=$(grep -hcE '^\s*-?\s*uses:\s*[^[:space:]]+' .github/workflows/*.y*ml 2>/dev/null | awk '{s+=$1} END {print s+0}')

          {
            echo "## Pinact — pin check"
            echo ""
            if [[ "$ec" == "0" ]]; then
              echo "**Result:** ✅ Passed"
            else
              echo "**Result:** ❌ Failed (exit $ec)"
            fi
            echo ""
            echo "| Workflows scanned | \`uses:\` references |"
            echo "|---|---|"
            echo "| $n_files | $n_uses |"
            echo ""
            if [[ "$ec" != "0" ]]; then
              echo "### Output"
              echo '```'
              cat /tmp/pinact.out
              echo '```'
              echo ""
              echo "> How to fix: replace every \`uses: owner/repo@<tag>\` by \`uses: owner/repo@<40-char-sha>  # <tag>\`."
              echo "> Run \`pinact run\` locally to auto-pin, then commit the diff."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$ec"

  denylist-check:
    name: Denylist check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: caller

      - name: Checkout deny-actions-registry
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: huggingface/deny-actions-registry
          path: registry
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run denylist check
        env:
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: |
          ./registry/scripts/check.sh \
            ./registry/denylist.yaml \
            ./caller/.github/workflows
