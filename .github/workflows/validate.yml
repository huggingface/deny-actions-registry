name: validate

# Reusable workflow called by other repos in the org, typically via
# an Organization Ruleset configured as "Required workflow".
#
# Two checks against the caller repo's workflows:
#   1. pinact : every `uses:` must be pinned to a 40-char SHA.
#   2. denylist : no `uses:` may reference a SHA listed in this repo's
#      denylist.yaml.
#
# On pull_request events from the SAME repo (not a fork), pinact also
# auto-fixes fixable violations by committing & pushing to the PR head
# branch. Forks fall back to inline suggestions only.
#
# Caller workflow MUST grant:
#   permissions:
#     contents: write          # for the auto-pin commit/push
#     pull-requests: write     # for the fallback PR review suggestions

on:
  workflow_call:

jobs:
  pinact-check:
    name: Pin check (SHA + comment)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout caller repo (PR branch if PR)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: caller
          # ref: empty on push events → default branch; on PRs → head branch
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          # token is needed for the auto-pin push
          token: ${{ github.token }}
          persist-credentials: true

      - name: Checkout deny-actions-registry
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: huggingface/deny-actions-registry
          path: registry
          ref: main

      - name: Install pinact
        run: |
          set -euo pipefail
          VERSION="v3.6.0"
          curl -fsSL -o /tmp/pinact.tar.gz \
            "https://github.com/suzuki-shunsuke/pinact/releases/download/${VERSION}/pinact_linux_amd64.tar.gz"
          tar -xzf /tmp/pinact.tar.gz -C /tmp pinact
          sudo install -m 0755 /tmp/pinact /usr/local/bin/pinact
          pinact --version

      - name: Run pinact in check mode
        id: pinact
        working-directory: caller
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          pinact run --check 2>&1 | tee /tmp/pinact.out
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Auto-pin & push commit (same-repo PRs only)
        id: autofix
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          steps.pinact.outputs.exitcode != '0'
        working-directory: caller
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
          AUTHOR_ID: ${{ github.event.pull_request.user.id }}
        run: |
          set -euo pipefail
          # Auto-pin everything pinact can resolve (unfixable cases like
          # @latest or invalid SHA refs are left alone).
          pinact run || true

          if git diff --quiet; then
            echo "::notice::Pinact had nothing auto-fixable (likely only unfixable cases remain)."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(security): auto-pin GitHub Actions to SHAs

Pinned by huggingface/deny-actions-registry validate.yml.

Co-authored-by: ${AUTHOR_LOGIN} <${AUTHOR_ID}+${AUTHOR_LOGIN}@users.noreply.github.com>"

          git push origin "HEAD:${BRANCH}"
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Auto-pinned ${BRANCH}. Note: GITHUB_TOKEN pushes do not re-trigger workflows. Re-run this job or push another commit to validate."

      - name: Report violations (summary)
        if: always()
        env:
          PINACT_EXITCODE: ${{ steps.pinact.outputs.exitcode }}
          PINACT_OUTPUT: /tmp/pinact.out
          CALLER_DIR: caller
          AUTOFIX_PUSHED: ${{ steps.autofix.outputs.pushed }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: python3 registry/scripts/report-pinact.py

      - name: Fail if pinact found violations
        if: always()
        run: exit "${{ steps.pinact.outputs.exitcode }}"

  denylist-check:
    name: Denylist check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: caller

      - name: Checkout deny-actions-registry
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: huggingface/deny-actions-registry
          path: registry
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run denylist check
        run: |
          bash ./registry/scripts/check.sh \
            ./registry/denylist.yaml \
            ./caller/.github/workflows
