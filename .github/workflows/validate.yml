name: validate

# Reusable workflow called by other repos in the org, typically via
# an Organization Ruleset configured as "Required workflow".
#
# Runs two checks against the caller repo's workflows:
#   1. pinact --check : every `uses:` must be pinned to a 40-char SHA,
#      with a min_age guard and comment verification.
#   2. denylist scan  : no `uses:` may reference a SHA listed in
#      denylist.yaml of this repo.
#
# When invoked on a pull_request event with `pull-requests: write`
# permission, pinact violations are posted as a PR review with
# `Apply suggestion` blocks so the dev can fix in one click.

on:
  workflow_call:

jobs:
  pinact-check:
    name: Pin check (SHA + comment)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: caller

      - name: Checkout deny-actions-registry
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: huggingface/deny-actions-registry
          path: registry
          ref: main

      - name: Install pinact
        run: |
          set -euo pipefail
          VERSION="v3.6.0"
          curl -fsSL -o /tmp/pinact.tar.gz \
            "https://github.com/suzuki-shunsuke/pinact/releases/download/${VERSION}/pinact_linux_amd64.tar.gz"
          tar -xzf /tmp/pinact.tar.gz -C /tmp pinact
          sudo install -m 0755 /tmp/pinact /usr/local/bin/pinact
          pinact --version

      - name: Run pinact in check mode
        id: pinact
        working-directory: caller
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          pinact run --check 2>&1 | tee /tmp/pinact.out
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Report violations (summary + PR suggestions)
        if: always()
        env:
          PINACT_EXITCODE: ${{ steps.pinact.outputs.exitcode }}
          PINACT_OUTPUT: /tmp/pinact.out
          CALLER_DIR: caller
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: python3 registry/scripts/report-pinact.py

      - name: Fail if pinact found violations
        if: always()
        run: exit "${{ steps.pinact.outputs.exitcode }}"

  denylist-check:
    name: Denylist check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: caller

      - name: Checkout deny-actions-registry
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: huggingface/deny-actions-registry
          path: registry
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run denylist check
        run: |
          bash ./registry/scripts/check.sh \
            ./registry/denylist.yaml \
            ./caller/.github/workflows
